plugins {
    id "com.android.application"
}

def releaseStoreFile = System.getenv("AUTOSWIPE_KEYSTORE")
def releaseStorePassword = System.getenv("AUTOSWIPE_KEYSTORE_PASSWORD")
def releaseKeyAlias = System.getenv("AUTOSWIPE_KEY_ALIAS")
def releaseKeyPassword = System.getenv("AUTOSWIPE_KEY_PASSWORD")

android {
    namespace "com.example.autoswipe"
    compileSdk 35

    signingConfigs {
        release {
            if (releaseStoreFile != null) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    defaultConfig {
        applicationId "com.example.autoswipe"
        minSdk 24
        targetSdk 35
        versionCode 10
        versionName "1.0.9"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}
